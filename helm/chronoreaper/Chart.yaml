apiVersion: v2
name: chronoreaper
description: |
  A Kubernetes operator that automatically deletes resources annotated with
  wenisch.tech/ttl when the specified UTC timestamp has passed.
type: application
version: 1.0.1
appVersion: "1.0.1"
kubeVersion: ">=1.25.0-0"
annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: AGPL-3.0-only
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/prerelease: "false"
  artifacthub.io/images: |
    - name: chronoreaper
      image: ghcr.io/wenisch-tech/chronoreaper:1.0.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/wenisch-tech/ChronoReaper
    - name: Documentation
      url: https://github.com/wenisch-tech/ChronoReaper/blob/main/README.md
  artifacthub.io/changes: |
    - kind: added
      description: Initial Artifact Hub publication for the ChronoReaper chart.
keywords:
  - kubernetes
  - operator
  - ttl
  - garbage-collection
home: https://github.com/wenisch-tech/ChronoReaper
sources:
  - https://github.com/wenisch-tech/ChronoReaper
maintainers:
  - name: wenisch-tech
    url: https://wenisch.tech
