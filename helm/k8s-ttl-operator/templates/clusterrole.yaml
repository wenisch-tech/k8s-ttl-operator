apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-ttl-operator.fullname" . }}
  labels:
    {{- include "k8s-ttl-operator.labels" . | nindent 4 }}
rules:
  # Core API group – namespaced resources
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - namespaces
    verbs: ["get", "list", "watch", "delete"]

  # Apps API group
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "delete"]

  # Batch API group
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "delete"]

  # Networking API group
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "delete"]

  # RBAC resources
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list", "watch", "delete"]

  # API Extensions (CRDs)
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch", "delete"]

  # Wildcard for custom resources (all groups)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "delete"]
