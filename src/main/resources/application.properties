# ---------------------------------------------------------
# Application configuration
# ---------------------------------------------------------

# Operator name shown in logs and metrics
quarkus.operator-sdk.operator-name=k8s-ttl-operator

# How often the TTL check runs (ISO-8601 duration or cron expression)
# Default: every 60 seconds
ttl.check.interval=60s

# Set to true to log deletions without actually deleting resources
ttl.dry-run=false

# ---------------------------------------------------------
# Kubernetes client
# ---------------------------------------------------------
# Trust the in-cluster CA (required when running inside the cluster)
quarkus.kubernetes-client.trust-certs=true

# ---------------------------------------------------------
# HTTP / Health
# ---------------------------------------------------------
quarkus.http.port=8080
%dev.quarkus.http.port=8080

# Expose health and metrics on a separate management port
quarkus.management.enabled=true
quarkus.management.port=8081

# ---------------------------------------------------------
# Logging
# ---------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."tech.wenisch".level=DEBUG

# ---------------------------------------------------------
# Container image (used by quarkus-container-image-* extensions)
# ---------------------------------------------------------
quarkus.container-image.group=wenischtech
quarkus.container-image.name=k8s-ttl-operator
quarkus.container-image.tag=1.0.0

# ---------------------------------------------------------
# Kubernetes deployment descriptors
# ---------------------------------------------------------
quarkus.kubernetes.service-account=k8s-ttl-operator
quarkus.kubernetes.labels."app.kubernetes.io/name"=k8s-ttl-operator
quarkus.kubernetes.labels."app.kubernetes.io/version"=1.0.0
quarkus.kubernetes.labels."app.kubernetes.io/managed-by"=olm

# ---------------------------------------------------------
# Dev mode overrides
# ---------------------------------------------------------
%dev.quarkus.kubernetes-client.devservices.enabled=false
