name: Bundle

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      previous_version:
        required: false
        type: string
        default: ''
      image:
        required: true
        type: string

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Pull the latest commit so we pick up release changes (chart version bump, etc.)
          ref: main

      - name: Determine previous version
        id: prev
        shell: bash
        run: |
          set -euo pipefail
          prev="${{ inputs.previous_version }}"
          if [ -z "$prev" ]; then
            # Derive from the last tag before the current one
            prev=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p' | sed 's/^v//' || true)
          fi
          echo "version=$prev" >> "$GITHUB_OUTPUT"

      - name: Create versioned bundle directory
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          dest="bundle/k8s-ttl-operator/${version}"
          mkdir -p "$dest/manifests" "$dest/metadata"

          # Copy metadata (annotations stay the same across versions)
          cp bundle/metadata/annotations.yaml "$dest/metadata/annotations.yaml"

          # Copy and rename the CSV
          src_csv="bundle/manifests/k8s-ttl-operator.v1.0.0.clusterserviceversion.yaml"
          dest_csv="$dest/manifests/k8s-ttl-operator.v${version}.clusterserviceversion.yaml"
          cp "$src_csv" "$dest_csv"

          # Patch metadata.name
          yq eval ".metadata.name = \"k8s-ttl-operator.v${version}\"" -i "$dest_csv"

          # Patch spec.version
          yq eval ".spec.version = \"${version}\"" -i "$dest_csv"

          # Patch containerImage annotation
          yq eval ".metadata.annotations.containerImage = \"${{ inputs.image }}:${version}\"" -i "$dest_csv"

          # Patch deployment container image
          yq eval '(.spec.install.spec.deployments[].spec.template.spec.containers[] | select(.name == "operator")).image = "${{ inputs.image }}:'"${version}"'"' -i "$dest_csv"

          # Patch spec.replaces (OLM upgrade graph)
          prev="${{ steps.prev.outputs.version }}"
          if [ -n "$prev" ]; then
            yq eval ".spec.replaces = \"k8s-ttl-operator.v${prev}\"" -i "$dest_csv"
          else
            yq eval 'del(.spec.replaces)' -i "$dest_csv"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}

      - name: Build and push bundle image
        uses: docker/build-push-action@v6
        with:
          context: bundle
          file: bundle/Dockerfile
          push: true
          tags: |
            ${{ inputs.image }}-bundle:${{ inputs.version }}
            ${{ inputs.image }}-bundle:latest

      - name: Commit versioned bundle to repository
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bundle/k8s-ttl-operator/
          git diff --cached --quiet || git commit -m "chore(bundle): add OLM bundle for v${{ inputs.version }} [skip ci]"
          git push
